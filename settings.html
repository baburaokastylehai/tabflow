<!DOCTYPE html>
<html>
<head>
    <title>TabFlow — Settings</title>
    <style>
        :root {
            --bg: #1A1714;
            --surface: #24201B;
            --border: rgba(193, 124, 78, 0.12);
            --text: #E8E2D8;
            --text-dim: #8A8072;
            --accent: #C17C4E;
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 32px 24px;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 440px;
            margin: 0 auto;
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
            color: var(--text);
        }
        .subtitle {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 28px;
        }
        .setting {
            margin-bottom: 20px;
        }
        label {
            font-size: 14px;
            font-weight: 500;
            display: block;
            margin-bottom: 8px;
            color: var(--text);
        }
        .hint {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 6px;
        }
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus {
            border-color: var(--accent);
        }
        input::placeholder {
            color: var(--text-dim);
        }
        button {
            width: 100%;
            padding: 11px 20px;
            background-color: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.15s;
            margin-top: 8px;
        }
        button:hover {
            background-color: #D4915F;
        }
        #status-message {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            color: #5CBF8A;
            opacity: 0;
            transition: opacity 0.2s;
        }
        #status-message.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>TabFlow Settings</h1>
        <p class="subtitle">configure how your tabs are managed.</p>

        <div class="setting">
            <label for="suspend-time">Suspend tabs after (hours)</label>
            <input type="number" id="suspend-time" placeholder="e.g. 2" />
            <p class="hint">tabs inactive for this long will be automatically suspended.</p>
        </div>

        <div class="setting">
            <label for="excluded-domains">Excluded domains</label>
            <input type="text" id="excluded-domains" placeholder="gmail.com, slack.com, notion.so" />
            <p class="hint">comma-separated. these sites will never be suspended.</p>
        </div>

        <button id="save-settings">Save Settings</button>
        <div id="status-message">settings saved.</div>
    </div>

    <script src="settings.js"></script>
</body>
</html>
